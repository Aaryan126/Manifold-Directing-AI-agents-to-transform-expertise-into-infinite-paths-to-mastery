services:
  - type: web
    name: manifold-pipeline-aaryan126
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./pipeline/Dockerfile.render
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: VIDEO_PROVIDER
        value: local
      - key: CORS_ORIGINS
        value: https://manifold-aaryan126.onrender.com

  - type: web
    name: manifold-aaryan126
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./web/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NEXT_PUBLIC_PIPELINE_BASE_URL
        value: https://manifold-pipeline-aaryan126.onrender.com
